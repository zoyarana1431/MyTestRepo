services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qatm
      POSTGRES_PASSWORD: qatm
      POSTGRES_DB: qatm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qatm -d qatm"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://qatm:qatm@db:5432/qatm
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - qatm_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - api

volumes:
  pgdata:
  qatm_uploads:
